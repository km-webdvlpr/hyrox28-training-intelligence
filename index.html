      content="Cadence is a local-first execution intelligence app for planning repeatable behaviors, logging what happened, and reviewing the gap between intent and reality."

    <script>
      (function restoreGithubPagesPath() {
        const redirect = window.sessionStorage.getItem('cadence-redirect')
        if (!redirect) return
        window.sessionStorage.removeItem('cadence-redirect')
        window.history.replaceState(null, '', redirect)
      })()
    </script>
